# ALUCOLUX® 成本计算器 — Nginx 站点配置
# 部署路径：/etc/nginx/sites-available/alucolux → sites-enabled/
#
# 域名：
#   - alucolux.shenliwen.cc（当前）
#   - sspc.alucolux.com.cn（IT 解析就绪后，运行 server_add_https_domain.sh 追加证书）
#
# Streamlit 本机：127.0.0.1:8501

upstream alucolux_streamlit {
    server 127.0.0.1:8501;
}

# HTTP：ACME 验证 + 其余跳转 HTTPS（certbot 首次安装前可暂时注释 return 301 块）
server {
    listen 80;
    listen [::]:80;
    server_name alucolux.shenliwen.cc sspc.alucolux.com.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS（证书由 certbot 管理；下方 ssl_certificate 路径为 certbot 默认）
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alucolux.shenliwen.cc sspc.alucolux.com.cn;

    ssl_certificate     /etc/letsencrypt/live/alucolux.shenliwen.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alucolux.shenliwen.cc/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://alucolux_streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# 可选：保留 IP 直连 HTTP（内网测试）；不需要时可删除本 server 块
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 47.102.222.183 _;

    location / {
        proxy_pass http://alucolux_streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
